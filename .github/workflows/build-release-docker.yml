name: Build, Release and Docker

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  PROJECT_PATH: 'src/TelegramMonitor.csproj'
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/telegrammonitor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.ver.outputs.VERSION }}
      IMAGE_NAME_LC: ${{ steps.ver.outputs.IMAGE_NAME_LC }}
    steps:
      - id: ver
        shell: bash
        run: |
          VERSION="1.$(TZ='Asia/Shanghai' date +'%Y%m%d.%H%M')"
          IMAGE_NAME_LC=$(echo "ghcr.io/${{ github.repository_owner }}/telegrammonitor" | tr '[:upper:]' '[:lower:]')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > version.txt
      - uses: actions/upload-artifact@v7
        with:
          name: version
          path: version.txt
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: linux-x64, rid: linux-x64, artifact: TelegramMonitor-linux-x64.tar.gz }
          - { name: linux-arm64, rid: linux-arm64, artifact: TelegramMonitor-linux-arm64.tar.gz }
          - { name: osx-x64, rid: osx-x64, artifact: TelegramMonitor-osx-x64.zip }
          - { name: osx-arm64, rid: osx-arm64, artifact: TelegramMonitor-osx-arm64.zip }
          - { name: windows-x86, rid: win-x86, artifact: TelegramMonitor-windows-x86.zip }
          - { name: windows-x64, rid: win-x64, artifact: TelegramMonitor-windows-x64.zip }
          - { name: windows-arm64, rid: win-arm64, artifact: TelegramMonitor-windows-arm64.zip }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" \
            --configuration "$CONFIGURATION" \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o "out/${{ matrix.rid }}"

          find "out/${{ matrix.rid }}" -type f \( -name '*.pdb' -o -name '*.xml' \) -delete

          cd "out/${{ matrix.rid }}"
          case "${{ matrix.artifact }}" in
            *.tar.gz)
              tar -czf "../${{ matrix.artifact }}" .
              ;;
            *.zip)
              zip -r -q "../${{ matrix.artifact }}" .
              ;;
          esac
          cd ../..
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: out/${{ matrix.artifact }}
          retention-days: 3

  docker-build:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: linux-x64
          path: out/linux-amd64
      - uses: actions/download-artifact@v7
        with:
          name: linux-arm64
          path: out/linux-arm64
      - uses: actions/download-artifact@v7
        with:
          name: version
          path: .
      - name: Prepare binaries
        shell: bash
        run: |
          tar -xzf out/linux-amd64/TelegramMonitor-linux-x64.tar.gz -C out/linux-amd64 --strip-components=1
          chmod +x out/linux-amd64/TelegramMonitor

          tar -xzf out/linux-arm64/TelegramMonitor-linux-arm64.tar.gz -C out/linux-arm64 --strip-components=1
          chmod +x out/linux-arm64/TelegramMonitor
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ver
        shell: bash
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-platform image
        shell: bash
        run: |
          IMAGE_NAME_LC=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BIN_NAME=TelegramMonitor \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --provenance=false \
            --sbom=false \
            --push \
            -t "$IMAGE_NAME_LC:latest" \
            -t "$IMAGE_NAME_LC:${{ steps.ver.outputs.VERSION }}" \
            .

          docker buildx imagetools inspect "$IMAGE_NAME_LC:latest"
          docker buildx imagetools inspect "$IMAGE_NAME_LC:${{ steps.ver.outputs.VERSION }}"

  release:
    if: github.repository == 'Riniba/TelegramMonitor'
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - id: meta
        shell: bash
        run: |
          echo "DATETIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S CST')" >> "$GITHUB_OUTPUT"
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.VERSION }}
          name: "Release ${{ needs.prepare.outputs.VERSION }}"
          body: |
            Release date: `${{ steps.meta.outputs.DATETIME }}`
            Published by: `${{ github.actor }}`

            Latest commit:
            `${{ steps.meta.outputs.COMMIT_MSG }}`

            Supported platforms:
            - Windows (`x64` / `x86` / `ARM64`)
            - Linux (`x64` / `ARM64`)
            - macOS (`Intel` / `Apple Silicon`)

            Docker images:
            - `${{ needs.prepare.outputs.IMAGE_NAME_LC }}:latest`
            - `${{ needs.prepare.outputs.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.VERSION }}`

            Documentation:
            - README: https://github.com/${{ github.repository }}/blob/main/README.md
            - Wiki: https://github.com/${{ github.repository }}/wiki

            Release assets:
            - `TelegramMonitor-windows-x64.zip`
            - `TelegramMonitor-windows-x86.zip`
            - `TelegramMonitor-windows-arm64.zip`
            - `TelegramMonitor-linux-x64.tar.gz`
            - `TelegramMonitor-linux-arm64.tar.gz`
            - `TelegramMonitor-osx-x64.zip`
            - `TelegramMonitor-osx-arm64.zip`
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
